spring.application.name=config-server
server.port=8888

spring.profiles.active=git
# Point to local configuration repository for faster startup in development
spring.cloud.config.server.git.uri=file://${user.dir}/../configurations-repo
spring.cloud.config.server.git.search-paths=platform,services
# startup speed
spring.cloud.config.server.git.clone-on-start=true

